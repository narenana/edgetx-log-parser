<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e1117" />

    <title>EdgeTX Log Viewer — replay your RC flight in 3D</title>
    <meta name="description" content="Drop your transmitter's CSV log and replay the entire flight on a 3D globe with synced charts. Works in the browser — your logs never leave your machine." />

    <!-- Brand mark from the narenana YouTube channel — used by every shell:
         browser tab favicon, iOS apple-touch-icon, and the PWA manifest icon.
         The paper-plane SVG is kept as an explicit fallback for browsers that
         can't pick the JPEG (modern browsers handle JPEG favicons fine, but
         the SVG is one less round trip on first paint). -->
    <link rel="icon" type="image/jpeg" href="./narenana.jpg" sizes="200x200" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./narenana.jpg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="narenana" />
    <meta property="og:url" content="https://narenana.com/log-viewer/" />
    <meta property="og:title" content="EdgeTX Log Viewer — replay every flight in 3D" />
    <meta property="og:description" content="Drop your transmitter's CSV log and replay the entire flight on a 3D globe with synced charts. Browser-native — your logs never leave your machine." />
    <meta property="og:image" content="https://img.youtube.com/vi/6MLQCoG5t2w/maxresdefault.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="EdgeTX Log Viewer — 3D flight replay on a satellite globe with synced telemetry charts" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EdgeTX Log Viewer — replay every flight in 3D" />
    <meta name="twitter:description" content="Drop a CSV, get a 3D flyby with synced telemetry charts. Browser-native, nothing uploaded." />
    <meta name="twitter:image" content="https://img.youtube.com/vi/6MLQCoG5t2w/maxresdefault.jpg" />
    <meta name="twitter:image:alt" content="EdgeTX Log Viewer — 3D flight replay" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
