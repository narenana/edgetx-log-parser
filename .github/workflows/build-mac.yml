name: Build macOS Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package macOS Universal DMG
        run: npx electron-builder --mac dmg --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_NAME: "-"
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ad-hoc sign the .app inside the DMG
        run: |
          for DMG in release/*.dmg; do
            echo "Processing $DMG"
            MOUNT=$(hdiutil attach "$DMG" -nobrowse -noautoopen | tail -1 | awk '{print $NF}')
            APP=$(find "$MOUNT" -maxdepth 1 -name "*.app" | head -1)
            if [ -n "$APP" ]; then
              echo "Ad-hoc signing $APP"
              codesign --force --deep --sign "-" "$APP"
            fi
            hdiutil detach "$MOUNT" -quiet
          done

      - name: Remove macOS quarantine attribute from DMG
        run: xattr -cr release/*.dmg

      - name: Clean up blockmap and yml files
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          echo "Final release contents:"
          ls -lh release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-universal
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package Windows (installer + portable)
        run: npx electron-builder --win nsis portable --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          Remove-Item release\*.blockmap -ErrorAction SilentlyContinue
          Remove-Item release\*.yml -ErrorAction SilentlyContinue
          Remove-Item release\*.yaml -ErrorAction SilentlyContinue
          Get-ChildItem release\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          generate_release_notes: false
          body: |
            ## EdgeTX Log Parser v3.0.0

            Parse and replay your EdgeTX transmitter flight logs — interactive 3D globe, synced charts, attitude visualiser, and flight event detection. Available as a native desktop app or instantly in the browser.

            ---

            ### 🌐 Web App
            No download needed — open it straight in your browser:
            **https://Cr4zySh4rk.github.io/edgetx-log-parser/**

            ---

            ### 💾 Downloads

            #### macOS
            | File | Description |
            |------|-------------|
            | `EdgeTX-Log-Parser-3.0.0-universal.dmg` | Universal binary — Intel & Apple Silicon (M1/M2/M3/M4) |

            > **First launch:** macOS will show "unidentified developer" since the app is not notarized with a paid Apple Developer certificate. To open: **right-click → Open → Open**. You only need to do this once.

            #### Windows
            | File | Description |
            |------|-------------|
            | `EdgeTX-Log-Parser-3.0.0-Setup.exe` | NSIS installer — installs to Program Files, adds Start Menu shortcut |
            | `EdgeTX-Log-Parser-3.0.0-Portable.exe` | Portable — no install required, run from anywhere |

            ---

            ### 🔧 What's new in this fork (vs. upstream)

            #### macOS support
            - **Universal DMG build** — single installer that runs natively on both Intel and Apple Silicon, built on GitHub Actions `macos-latest` runners
            - **Ad-hoc code signing** — signs the `.app` bundle with a local identity so macOS Gatekeeper doesn't show the "app is damaged" error on download
            - **Clean releases** — blockmap and auto-update yml files are stripped before upload so only the DMG appears in the release assets

            #### Windows support (restored from upstream)
            - **NSIS installer** (`*-Setup.exe`) — standard installer with Start Menu integration and uninstaller, custom install directory support
            - **Portable executable** (`*-Portable.exe`) — single file, no install needed

            #### GitHub Pages web app
            - Deployed the existing web build target (`VITE_BUILD_TARGET=web`) to GitHub Pages via a dedicated Actions workflow
            - Auto-deploys on every push to `master` — always up to date with the latest code
            - Full PWA support: installable from the browser, works offline after first visit
            - Repository "About" homepage set to the Pages URL

            #### CI / build infrastructure
            - All builds run entirely on GitHub Actions — no local toolchain required to produce releases
            - Mac and Windows jobs run in parallel; release is created only after both succeed
            - Triggered automatically on `v*` tags, or manually via `workflow_dispatch`
