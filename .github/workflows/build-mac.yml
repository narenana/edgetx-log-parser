name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package macOS Universal DMG
        run: npx electron-builder --mac dmg --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_NAME: "-"
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          echo "Release contents:"
          ls -lh release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-universal
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package Windows portable
        run: npx electron-builder --win portable --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          Remove-Item release\*.blockmap -ErrorAction SilentlyContinue
          Remove-Item release\*.yml -ErrorAction SilentlyContinue
          Remove-Item release\*.yaml -ErrorAction SilentlyContinue
          Get-ChildItem release\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package Linux tar.gz
        run: npx electron-builder --linux tar.gz --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          echo "Release contents:"
          ls -lh release/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*.tar.gz
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
          generate_release_notes: false
          body: |
            ## EdgeTX Log Parser v3.0.0

            Parse and replay your EdgeTX transmitter flight logs — interactive 3D globe, synced charts, attitude visualiser, and flight event detection. Available as a native desktop app or instantly in the browser.

            ---

            ### 🌐 Web App
            No download needed — open it straight in your browser:
            **https://Cr4zySh4rk.github.io/edgetx-log-parser/**

            ---

            ### 💾 Downloads

            #### macOS
            | File | Description |
            |------|-------------|
            | `*-universal.dmg` | Universal binary — Intel & Apple Silicon (M1/M2/M3/M4) |

            > **First launch:** macOS will show "unidentified developer" since the app is not notarized. To open: **right-click → Open → Open**. You only need to do this once.

            #### Windows
            | File | Description |
            |------|-------------|
            | `*-Portable.exe` | Portable — no install required, run from anywhere |

            #### Linux
            | File | Description |
            |------|-------------|
            | `*.tar.gz` | Linux x64 tar archive — extract and run the included binary |

            ---

            ### 🔧 What's new in this fork (vs. upstream v2.1.0)

            #### App improvements (carried from upstream v3.0.0)
            - **PWA support** — installable from the browser, works offline after first visit
            - **GA4 analytics** with privacy-first Consent Mode v2
            - **Code splitting** — Dashboard, GlobeView and AltitudeAttitudeView load on demand for faster startup
            - **Responsive layout** — breakpoints for tablet and mobile
            - **Landing page**, sample flight demo, and share-URL hook (`?log=`)
            - **Dual-target build** — single source tree produces both the web app and the desktop app

            #### macOS releases (new in this fork)
            - **Universal DMG** — single installer that runs natively on both Intel and Apple Silicon
            - **Ad-hoc code signing** (`CSC_NAME="-"`) applied during packaging — prevents Gatekeeper "app is damaged" error on download
            - Built on GitHub Actions `macos-latest` runners — no local Mac needed to produce releases

            #### Windows releases (restored + simplified)
            - **Portable executable** — single `.exe`, no installer, no registry changes, run from anywhere
            - Built on GitHub Actions `windows-latest` runners

            #### Linux releases (restored from upstream)
            - **tar.gz archive** for x64 — extract and run, same as upstream v2.1.0
            - Built on GitHub Actions `ubuntu-latest` runners

            #### GitHub Pages web app (new in this fork)
            - The existing web build target deployed to GitHub Pages at **https://Cr4zySh4rk.github.io/edgetx-log-parser/**
            - Auto-deploys on every push to `master`
            - Full PWA: installable from the browser, offline-capable after first visit

            #### CI / build infrastructure (new in this fork)
            - All three platform builds (macOS, Windows, Linux) run in parallel on GitHub Actions
            - Release is created automatically only after all three jobs succeed
            - Triggered on `v*` tags or manually via `workflow_dispatch`
            - Clean release assets — blockmap and auto-update yml files stripped before upload
