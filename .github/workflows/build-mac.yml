name: Build macOS Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package macOS Universal DMG
        run: npx electron-builder --mac dmg --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_NAME: "-"
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ad-hoc sign the .app inside the DMG
        run: |
          for DMG in release/*.dmg; do
            echo "Processing $DMG"
            MOUNT=$(hdiutil attach "$DMG" -nobrowse -noautoopen | tail -1 | awk '{print $NF}')
            APP=$(find "$MOUNT" -maxdepth 1 -name "*.app" | head -1)
            if [ -n "$APP" ]; then
              echo "Ad-hoc signing $APP"
              codesign --force --deep --sign "-" "$APP"
            fi
            hdiutil detach "$MOUNT" -quiet
          done

      - name: Remove macOS quarantine attribute from DMG
        run: xattr -cr release/*.dmg

      - name: Clean up blockmap and yml files
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          echo "Final release contents:"
          ls -lh release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-universal
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package Windows (installer + portable)
        run: npx electron-builder --win nsis portable --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          Remove-Item release\*.blockmap -ErrorAction SilentlyContinue
          Remove-Item release\*.yml -ErrorAction SilentlyContinue
          Remove-Item release\*.yaml -ErrorAction SilentlyContinue
          Get-ChildItem release\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          generate_release_notes: true
          body: |
            ## EdgeTX Log Parser – Release

            ### macOS
            | File | Description |
            |------|-------------|
            | `*-universal.dmg` | Universal – runs natively on both Intel and Apple Silicon Macs |

            > **First launch on macOS:** right-click the app → **Open** → **Open** to bypass the unidentified developer warning (once only).

            ### Windows
            | File | Description |
            |------|-------------|
            | `*-Setup.exe` | NSIS installer (recommended) |
            | `*-Portable.exe` | Portable – no install needed, run anywhere |

            ### Web App
            No install needed — use the live web app:
            https://Cr4zySh4rk.github.io/edgetx-log-parser/
