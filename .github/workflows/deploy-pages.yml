name: Deploy Web App to GitHub Pages

# Only runs on forks — prevents a second public-facing host from lighting up
# on the canonical narenana/edgetx-log-parser repo (which already auto-deploys
# to narenana.com/log-viewer/ via Cloudflare Pages). Forkers get GH Pages
# convenience without touching upstream analytics, PWA scope, or SEO.
# See: https://github.com/narenana/edgetx-log-parser/pull/7

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository_owner != 'narenana'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_BUILD_TARGET: web
          VITE_CESIUM_TOKEN: ${{ secrets.VITE_CESIUM_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.repository_owner != 'narenana'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
