name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` strictly enforces lockfile shape and on macOS arm64
        # has hit a flaky "Exit handler never called!" bug intermittently
        # — when it crashes mid-install, devDeps like cross-env are
        # missing for the next step. `npm install` is more forgiving and
        # equally fast on a cold runner; the lockfile is still respected
        # for resolution, just not enforced.
        run: npm install --no-audit --no-fund

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package macOS Universal DMG
        # Shipping universal-only (Intel + Apple Silicon in one binary).
        # Verified with a fresh download on an M1 Mac — right-click → Open →
        # Open on first launch works cleanly. A separate arm64 DMG would be
        # smaller but universal keeps the release page simple and covers all
        # Mac users with a single tested artifact.
        run: npx electron-builder --mac dmg --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_NAME: "-"
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          echo "Release contents:"
          ls -lh release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` strictly enforces lockfile shape and on macOS arm64
        # has hit a flaky "Exit handler never called!" bug intermittently
        # — when it crashes mid-install, devDeps like cross-env are
        # missing for the next step. `npm install` is more forgiving and
        # equally fast on a cold runner; the lockfile is still respected
        # for resolution, just not enforced.
        run: npm install --no-audit --no-fund

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package Windows (NSIS installer + portable)
        run: npx electron-builder --win nsis portable --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          Remove-Item release\*.blockmap -ErrorAction SilentlyContinue
          Remove-Item release\*.yml -ErrorAction SilentlyContinue
          Remove-Item release\*.yaml -ErrorAction SilentlyContinue
          Get-ChildItem release\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` strictly enforces lockfile shape and on macOS arm64
        # has hit a flaky "Exit handler never called!" bug intermittently
        # — when it crashes mid-install, devDeps like cross-env are
        # missing for the next step. `npm install` is more forgiving and
        # equally fast on a cold runner; the lockfile is still respected
        # for resolution, just not enforced.
        run: npm install --no-audit --no-fund

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package Linux tar.gz
        run: npx electron-builder --linux tar.gz --x64
        env:
          ELECTRON_BUILDER_PUBLISH: never
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up blockmap and yml files
        run: |
          rm -f release/*.blockmap release/*.yml release/*.yaml
          echo "Release contents:"
          ls -lh release/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*.tar.gz
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
          # Auto-generate the changelog (merged PRs since the last tag) and
          # prepend it to the body below. Avoids hand-editing release notes
          # for every tag while keeping the install instructions consistent.
          generate_release_notes: true
          body: |
            ## EdgeTX Log Parser ${{ github.ref_name }}

            Parse and replay your EdgeTX transmitter flight logs — interactive 3D globe, synced charts, attitude visualiser, flight event detection, and a pre-flight summary. Available as a native desktop app or instantly in the browser.

            ### Web app

            No install needed — open it in your browser at **<https://www.narenana.com/log-viewer/>**. Installable as a PWA from the address bar if you want a Dock / taskbar icon.

            ### Downloads

            #### macOS

            | File | Description |
            |------|-------------|
            | `*-universal.dmg` | Universal binary — runs natively on both Intel and Apple Silicon |

            > **First launch on macOS:** the app is ad-hoc signed but not notarized, so Gatekeeper will show *"unidentified developer."* To open: **right-click → Open → Open**. One-time only — subsequent launches are normal.

            #### Windows

            | File | Description |
            |------|-------------|
            | `EdgeTX Log Parser Setup *.exe` | NSIS installer — Start Menu shortcut + clean uninstall via Add/Remove Programs |
            | `EdgeTX Log Parser *.exe` | Portable — no install, run from anywhere / USB stick |

            #### Linux

            | File | Description |
            |------|-------------|
            | `edgetx-log-parser-*.tar.gz` | x64 tarball — extract and run the included binary |
